<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUT Dashboard - Premium Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <aside class="sidebar-left">
        <div class="brand">▦ ANTIGRAVITY</div>
        <div id="nav"></div>
        <div id="status">● Đang khởi tạo...</div>
    </aside>

    <main class="main-center">
        <div id="galleryOverlay">
            <h2 style="margin-bottom:20px; color:var(--primary)">ẢNH MẪU THAM KHẢO</h2>
            <img id="galleryImg" src="">
            <div class="gallery-nav">
                <button class="btn-gallery" onclick="window.changeRef(-1)">Trước</button>
                <button class="btn-gallery" onclick="window.toggleMode(false)">Thoát (Trở lại thử màu)</button>
                <button class="btn-gallery" onclick="window.changeRef(1)">Sau</button>
            </div>
            <p id="refCounter" style="margin-top:20px; color:#94a3b8; font-size:0.9rem"></p>
        </div>

        <div class="preview-container">
            <div class="canvas-box" onclick="document.getElementById('photoInput').click()" title="Nhấn để chọn ảnh hoặc video, Nhấn giữ để so sánh Before/After">
                <canvas id="cvs"></canvas>
                <input type="file" id="photoInput" class="hidden" accept="image/*,video/*">
                <video id="vSource" class="hidden" loop muted playsinline></video>
                <div id="hint">
                    <p>BƯỚC 1: CHỌN ẢNH HOẶC VIDEO</p>
                    <small>Cú click chuột đầu tiên để bắt đầu thử màu</small>
                </div>
            </div>
            
            <div class="control-bar">
                <div class="lut-name-display">
                    <h3 id="modeTitle">CHẾ ĐỘ: THỬ MÀU TRỰC TIẾP</h3>
                    <p id="activeLut">Mặc định</p>
                </div>
                <button id="btnRef" class="btn-mode" onclick="window.toggleMode(true)" disabled title="Xem ảnh mẫu phối màu chuyên nghiệp">
                    <span>🖼 Ảnh mẫu</span>
                </button>
                <button id="btnPlay" class="btn-mode hidden" onclick="window.togglePlay()">
                    <span id="playIcon">⏸ Dừng</span>
                </button>
                <div style="width: 180px">
                    <input type="range" id="intensity" min="0" max="100" value="100" style="width:100%; accent-color: var(--primary)">
                    <div style="display:flex; justify-content:space-between; font-size:0.6rem; color:#64748b; margin-top:5px; align-items: center;">
                        <span>Gốc</span> <span id="intVal">100%</span> <span id="logWarning" style="color:#fbbf24; display:none; font-weight:bold" title="LUT này dành cho video hệ LOG chuyên nghiệp, nếu áp vào video thường sẽ bị cháy sáng!">⚠️ LOG?</span> <span>Full</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <aside class="sidebar-right">
        <div class="right-header"><h2 id="catTitle">Danh mục</h2></div>
        <div class="lut-list-box" id="grid"></div>
    </aside>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
